# ─────────────────────────────────────────────────────────────────────
#  Decap CMS configuration — edits content via GitHub OAuth.
#  After login, this UI commits to chandan181singh/hello-world on main.
# ─────────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: chandan181singh/hello-world
  branch: main
  base_url: https://decap-oauth.chandan181singh.workers.dev
  auth_endpoint: auth

publish_mode: simple

media_folder: public/uploads
public_folder: /hello-world/uploads

site_url: https://chandan181singh.github.io/hello-world
display_url: https://chandan181singh.github.io/hello-world
logo_url: https://chandan181singh.github.io/hello-world/chandan.png

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  # ─── 1. Site profile (singleton) ────────────────────────────────────
  - name: site
    label: "Site"
    description: "Your name, role, bio, contact info, profile picture, and SEO keywords."
    delete: false
    editor:
      preview: false
    files:
      - name: profile
        label: "Profile / Site Settings"
        file: src/data/json/site.json
        fields:
          - { label: "Full Name", name: name, widget: string }
          - { label: "Short Name", name: shortName, widget: string }
          - { label: "Initials (2 letters)", name: initials, widget: string, pattern: ['^[A-Z]{1,3}$', 'Use 1–3 uppercase letters'] }
          - { label: "Role / Title", name: role, widget: string }
          - { label: "Current Company", name: company, widget: string }
          - { label: "Location", name: location, widget: string }
          - { label: "Tagline (1 line)", name: tagline, widget: string }
          - { label: "Bio (2–3 sentences)", name: bio, widget: text }
          - { label: "Email", name: email, widget: string }
          - { label: "Phone", name: phone, widget: string, required: false }
          - { label: "Site URL", name: url, widget: string }
          - { label: "Profile Picture", name: profileImage, widget: image, media_library: { config: { multiple: false } } }
          - { label: "Resume PDF Path", name: resumeUrl, widget: file, default: "/resume.pdf", hint: "Upload a new resume.pdf via the file picker — it replaces /public/resume.pdf." }
          - { label: "OG (Social) Image", name: ogImage, widget: image, required: false }
          - label: "SEO Keywords"
            name: keywords
            widget: list
            field: { label: Keyword, name: keyword, widget: string }

      - name: socials
        label: "Social Links"
        file: src/data/json/socials.json
        fields:
          - label: "Socials"
            name: socials
            widget: list
            collapsed: false
            summary: "{{fields.platform}} · {{fields.handle}}"
            fields:
              - label: "Platform"
                name: platform
                widget: select
                options:
                  - { label: GitHub,   value: github }
                  - { label: LinkedIn, value: linkedin }
                  - { label: Twitter,  value: twitter }
                  - { label: LeetCode, value: leetcode }
                  - { label: CodeChef, value: codechef }
                  - { label: Email,    value: email }
                  - { label: Phone,    value: phone }
              - { label: "Display Label", name: label, widget: string }
              - { label: "URL or mailto: / tel:", name: href, widget: string }
              - { label: "Handle (shown)", name: handle, widget: string, required: false }

      - name: nav
        label: "Navigation Links"
        file: src/data/json/nav.json
        fields:
          - label: "Menu Items"
            name: links
            widget: list
            summary: "{{fields.label}} → {{fields.href}}"
            fields:
              - { label: "Label", name: label, widget: string }
              - { label: "Href",  name: href,  widget: string }

  # ─── 2. Projects (data) ─────────────────────────────────────────────
  - name: projects
    label: "Projects"
    description: "Featured & secondary projects shown across the site."
    files:
      - name: projects
        label: "All Projects"
        file: src/data/json/projects.json
        fields:
          - label: "Projects"
            name: projects
            widget: list
            collapsed: true
            summary: "{{fields.title}} ({{fields.year}})"
            fields:
              - { label: "Slug (URL-safe ID)", name: slug, widget: string, pattern: ['^[a-z0-9-]+$', 'Lowercase letters, digits and hyphens only'] }
              - { label: "Title", name: title, widget: string }
              - { label: "Tagline (1 line)", name: tagline, widget: string }
              - { label: "Description", name: description, widget: text }
              - { label: "Year", name: year, widget: number, value_type: int, min: 2010, max: 2100 }
              - { label: "Month", name: month, widget: string, required: false }
              - { label: "Featured?", name: featured, widget: boolean, default: false }
              - label: "Status"
                name: status
                widget: select
                default: shipped
                options:
                  - { label: Shipped,   value: shipped }
                  - { label: WIP,       value: wip }
                  - { label: Archived,  value: archived }
              - label: "Tags (category badges)"
                name: tags
                widget: list
                field: { label: Tag, name: tag, widget: string }
              - label: "Tech Stack"
                name: stack
                widget: list
                field: { label: Item, name: item, widget: string }
              - { label: "GitHub URL",   name: github, widget: string, required: false }
              - { label: "Live URL",     name: live,   widget: string, required: false }
              - { label: "Cover Image",  name: image,  widget: image,  required: false }
              - label: "Highlights (bullets)"
                name: highlights
                widget: list
                field: { label: Highlight, name: bullet, widget: text }
                required: false

  # ─── 3. Experience ──────────────────────────────────────────────────
  - name: experience
    label: "Experience"
    description: "Work history shown on the home timeline."
    files:
      - name: experience
        label: "All Roles"
        file: src/data/json/experiences.json
        fields:
          - label: "Roles"
            name: experiences
            widget: list
            collapsed: true
            summary: "{{fields.role}} @ {{fields.company}} ({{fields.start}} → {{fields.end}})"
            fields:
              - { label: "Internal ID", name: id, widget: string, hint: "Unique slug, eg. marvell-fte" }
              - { label: "Company", name: company, widget: string }
              - { label: "Role / Title", name: role, widget: string }
              - label: "Type"
                name: type
                widget: select
                options:
                  - { label: Full-time,    value: full-time }
                  - { label: Internship,   value: internship }
                  - { label: Contract,     value: contract }
                  - { label: Open Source,  value: open-source }
              - { label: "Location", name: location, widget: string, required: false }
              - { label: "Start (e.g. Jan 2025)", name: start, widget: string }
              - { label: "End (or 'Present')", name: end, widget: string }
              - { label: "Company URL", name: url, widget: string, required: false }
              - label: "Highlights (bullets)"
                name: highlights
                widget: list
                field: { label: Bullet, name: bullet, widget: text }
              - label: "Tech Stack (optional)"
                name: stack
                widget: list
                required: false
                field: { label: Tech, name: tech, widget: string }

  # ─── 4. Education ───────────────────────────────────────────────────
  - name: education
    label: "Education"
    files:
      - name: education
        label: "Schools / Colleges"
        file: src/data/json/education.json
        fields:
          - label: "Education"
            name: education
            widget: list
            collapsed: true
            summary: "{{fields.institution}} ({{fields.start}}–{{fields.end}})"
            fields:
              - { label: "Internal ID", name: id, widget: string }
              - { label: "Institution", name: institution, widget: string }
              - { label: "Degree", name: degree, widget: string }
              - { label: "Field of Study", name: field, widget: string, required: false }
              - { label: "Start Year", name: start, widget: string }
              - { label: "End Year", name: end, widget: string }
              - { label: "Score / GPA", name: score, widget: string, required: false }
              - { label: "Location", name: location, widget: string, required: false }
              - label: "Highlights (optional)"
                name: highlights
                widget: list
                required: false
                field: { label: Bullet, name: bullet, widget: text }

  # ─── 5. Skills & Interests ──────────────────────────────────────────
  - name: skills
    label: "Skills & Interests"
    files:
      - name: skills
        label: "Skill Categories"
        file: src/data/json/skills.json
        fields:
          - label: "Categories"
            name: categories
            widget: list
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - { label: "Category Name", name: name, widget: string }
              - label: "Skills"
                name: skills
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: "Name", name: name, widget: string }
                  - { label: "Icon slug (simple-icons)", name: icon, widget: string, required: false, hint: "e.g. python, typescript. See simpleicons.org. Leave blank for no icon." }
          - label: "Interests (free text list)"
            name: interests
            widget: list
            field: { label: Interest, name: interest, widget: string }

  # ─── 6. Achievements ────────────────────────────────────────────────
  - name: achievements
    label: "Achievements"
    files:
      - name: achievements
        label: "Trophies / Awards"
        file: src/data/json/achievements.json
        fields:
          - label: "Achievements"
            name: achievements
            widget: list
            collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: "Internal ID", name: id, widget: string }
              - { label: "Title", name: title, widget: string }
              - { label: "Description", name: description, widget: text }
              - label: "Source"
                name: source
                widget: select
                options:
                  - { label: LeetCode,  value: leetcode }
                  - { label: CodeChef,  value: codechef }
                  - { label: Hackathon, value: hackathon }
                  - { label: Other,     value: other }
              - { label: "Link (URL)", name: href, widget: string, required: false }
              - { label: "Metric (e.g. Rating 1871)", name: metric, widget: string, required: false }

  # ─── 7. Blog (MDX folder) ───────────────────────────────────────────
  - name: blog
    label: "Blog Posts"
    folder: src/content/blog
    create: true
    delete: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Description / Excerpt", name: description, widget: text }
      - { label: "Date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Published", name: published, widget: boolean, default: true }
      - label: "Tags"
        name: tags
        widget: list
        field: { label: Tag, name: tag, widget: string }
      - { label: "Cover Image", name: cover, widget: image, required: false }
      - { label: "Body (Markdown)", name: body, widget: markdown }

  # ─── 8. Project Case Studies (MDX folder) ───────────────────────────
  - name: project-pages
    label: "Project Case Studies"
    folder: src/content/projects
    create: true
    delete: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Slug (must match a project from Projects)", name: slug, widget: string }
      - { label: "Body (Markdown)", name: body, widget: markdown }
